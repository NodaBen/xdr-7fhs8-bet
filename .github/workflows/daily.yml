name: Daily Diamond build

# v6.2 schedule notes (cron is UTC; ET shown for sanity):
#  - Minutes are deliberately OFF the hour and off :00/:15/:30/:45. GitHub's
#    shared scheduler queues heaviest at round times; the old ':00'/':25' crons
#    landed 4+ hours late, so every closer snap ran AFTER first pitch and kept
#    nothing. That is the direct cause of the missing 07-17/07-18 CLV data.
#  - Snaps are now DENSE rather than precise. grade.py keeps, per game, the last
#    snapshot taken before that game's own start, so more snaps only ever help.
on:
  schedule:
    - cron: '7 15 * * *'      # 11:07 AM ET  build: morning card
    - cron: '37 21 * * *'     #  5:37 PM ET  build: line-check rebuild
    - cron: '11 13 * * *'     #  9:11 AM ET  grade yesterday, append K archive
    # Self-correcting snap sweep: wake every 20 min across the baseball window.
    # Wake-ups are free; snap_smart.py decides whether a run is worth an odds-API
    # call. A run delayed six hours just evaluates the world as it finds it.
    # v6.5: the */20 sweep is RETIRED. GitHub delivered ~15% of those wake-ups,
    # 3-7 hours late, so every snap landed after first pitch and kept nothing.
    # Snaps now arrive via repository_dispatch from an external scheduler, which
    # fires on time. These two crons remain ONLY as a degraded-mode safety net.
    - cron: '23 22 * * *'     #  6:23 PM ET  fallback snap
    - cron: '23 1 * * *'      #  9:23 PM ET  fallback snap
  # External trigger. POST to the dispatches endpoint with event_type:
  #   snap  -> closer snapshot      build -> rebuild card      grade -> grade yesterday
  repository_dispatch:
    types: [snap, build, grade]
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to run'
        required: true
        default: build
        type: choice
        options:
          - build
          - snap
          - grade

permissions:
  contents: write
  issues: write

# Split the concurrency group per schedule. The old single group meant a delayed
# build run BLOCKED the snap run queued behind it. Push races are handled by the
# rebase-retry loop in Publish instead.
concurrency:
  group: daily-diamond-${{ github.event.schedule || format('manual-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - name: Resolve mode
        id: mode
        env:
          SCHED: ${{ github.event.schedule }}
          MANUAL: ${{ github.event.inputs.mode }}
          DISPATCH: ${{ github.event.action }}
        run: |
          # v6.5: repository_dispatch wins. github.event.action carries the
          # event_type sent by the external scheduler (snap|build|grade).
          if [ -n "${DISPATCH:-}" ]; then
            case "$DISPATCH" in
              snap|build|grade) M="$DISPATCH" ;;
              *) echo "::error::unknown dispatch type '$DISPATCH'"; exit 1 ;;
            esac
          else
            case "$SCHED" in
              "7 15 * * *"|"37 21 * * *") M=build ;;
              "11 13 * * *")              M=grade ;;
              "")                         M="${MANUAL:-build}" ;;
              *)                          M=snap ;;
            esac
          fi
          echo "mode=$M" >> "$GITHUB_OUTPUT"
          echo "Resolved mode: $M (schedule='$SCHED' dispatch='${DISPATCH:-}')"

      - name: Build card
        if: steps.mode.outputs.mode == 'build'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          DATE=$(TZ=America/New_York date +%F)
          python run_daily.py "$DATE"
          python stats.py
          python render.py "$DATE"
          test -s "daily_diamond_${DATE}.html"
          cp "daily_diamond_${DATE}.html" docs/index.html
          mkdir -p docs/archive
          cp "daily_diamond_${DATE}.html" "docs/archive/${DATE}.html"
          # v6.3: merge-fill, never cp. The evening rebuild only contains pregame
          # games; a cp would erase the afternoon picks the grade job needs.
          python archive_picks.py "$DATE"
          test -s "picktime_odds_${DATE}.json" || { echo "::error::picktime_odds_${DATE}.json missing - CLV baseline not frozen"; exit 1; }
          python -c "import json,sys; print('[clv] baseline games frozen:', len(json.load(open(sys.argv[1]))))" "picktime_odds_${DATE}.json"

      - name: Snap closers (self-correcting)
        id: snap
        if: steps.mode.outputs.mode == 'snap'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          DATE=$(TZ=America/New_York date +%F)
          # snap_smart decides whether this wake-up is worth an API call and
          # writes did_snap to $GITHUB_OUTPUT. grade.snap() carries its own
          # pre-start guard and coverage assertions when a call is spent.
          python snap_smart.py "$DATE"

      - name: Grade yesterday
        if: steps.mode.outputs.mode == 'grade'
        run: |
          DATE=$(TZ=America/New_York date -d yesterday +%F)
          test -f "docs/archive/${DATE}_picks.json" || { echo "::error::no archived picks for ${DATE}"; exit 1; }
          cp "docs/archive/${DATE}_picks.json" picks.json
          if [ -f grades_archive.jsonl ]; then BEFORE=$(wc -l < grades_archive.jsonl); else BEFORE=0; fi
          python grade.py grade "$DATE" | tee "docs/archive/${DATE}_grade.txt"
          test -s "docs/archive/${DATE}_grade.txt" || { echo "::error::grade output empty for ${DATE}"; exit 1; }
          AFTER=$(wc -l < grades_archive.jsonl)
          echo "[archive] rows ${BEFORE} -> ${AFTER}"
          if [ "$AFTER" -le "$BEFORE" ]; then echo "::error::grades_archive.jsonl did not grow for ${DATE}"; exit 1; fi
          python stats.py
          TODAY=$(TZ=America/New_York date +%F)
          if [ -f "docs/archive/${TODAY}_picks.json" ]; then
            cp "docs/archive/${TODAY}_picks.json" picks.json
            python render.py "$TODAY" && cp "daily_diamond_${TODAY}.html" docs/index.html \
              && cp "daily_diamond_${TODAY}.html" "docs/archive/${TODAY}.html"
          fi

      - name: Publish
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          DID="${{ steps.snap.outputs.did_snap }}"
          if [ "$MODE" = "snap" ] && [ "$DID" != "true" ]; then
            echo "[publish] snap spent no call - nothing to commit, exiting clean"
            exit 0
          fi
          git config user.name "daily-diamond-bot"
          git config user.email "bot@users.noreply.github.com"
          test -f docs/index.html || { echo "::error::docs/index.html missing"; exit 1; }
          git add -f docs/index.html
          git add -f docs/archive/
          if [ -f docs/stats.json ]; then git add -f docs/stats.json; fi
          for f in picks.json model_output.json odds_map.json slate.json raw_odds_response.json grades_archive.jsonl; do
            if [ -f "$f" ]; then git add -f "$f"; fi
          done
          for f in closers_*.json picktime_odds_*.json snap_state_*.json; do
            if [ -f "$f" ]; then git add -f "$f"; fi
          done
          echo "--- staged ---"
          git diff --cached --name-only
          if git diff --cached --quiet; then echo "::error::nothing staged - publish would be a no-op"; exit 1; fi
          git commit -m "run $(TZ=America/New_York date '+%F %H:%M %Z') [${{ steps.mode.outputs.mode }}]"
          PUSHED=0
          for i in 1 2 3 4 5; do
            if git push; then echo "[push] ok on attempt $i"; PUSHED=1; break; fi
            echo "[push] rejected, rebasing (attempt $i)"
            git pull --rebase --autostash origin main || true
            sleep $((i * 5))
          done
          if [ "$PUSHED" -ne 1 ]; then echo "::error::push failed after 5 attempts"; exit 1; fi

      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WHEN=$(TZ=America/New_York date '+%F %H:%M %Z')
          gh issue create --title "Daily Diamond FAILED [${{ steps.mode.outputs.mode }}] - $WHEN" --body "Run failed. mode=${{ steps.mode.outputs.mode }} schedule='${{ github.event.schedule || 'manual' }}'. Log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || echo "issue create failed (non-fatal)"
