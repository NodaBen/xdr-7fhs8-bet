name: Backfill once (DELETE AFTER USE)

# ONE-TIME USE ONLY. v6.6 repair pass.
# Rewrites archive rows that were misclassified as 'NO-BET (target unmet)' when
# they actually had no closing price, then refreshes docs/stats.json with the
# corrected structural closer-coverage number.
#
# Run once from the Actions tab, confirm the output, then DELETE this file.
# Idempotent: a second run repairs nothing and commits nothing.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - name: Repair archive status and refresh stats
        run: |
          test -f grades_archive.jsonl || { echo "::error::grades_archive.jsonl missing"; exit 1; }
          python repair_once.py
          python stats.py
          test -s docs/stats.json || { echo "::error::docs/stats.json not written"; exit 1; }
          echo "--- docs/stats.json ---"
          cat docs/stats.json

      - name: Publish
        run: |
          git config user.name "daily-diamond-bot"
          git config user.email "bot@users.noreply.github.com"
          rm -f grades_archive.jsonl.bak
          git add -f grades_archive.jsonl docs/stats.json
          echo "--- staged ---"
          git diff --cached --name-only
          if git diff --cached --quiet; then
            echo "nothing to commit - already repaired, safe to delete this workflow"
            exit 0
          fi
          git commit -m "v6.6 repair archive status + structural coverage"
          for i in 1 2 3 4 5; do
            if git push; then echo "[push] ok on attempt $i"; exit 0; fi
            echo "[push] rejected, rebasing (attempt $i)"
            git pull --rebase
          done
          echo "::error::push failed after 5 attempts"; exit 1
